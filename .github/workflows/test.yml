on:
  push:
    branches:
      - main
  pull_request:

name: test

# ⭕ [최종 해결책] 깃허브 액션 봇에게 댓글 작성 권한을 강제로 주입!
permissions:
  contents: read # 소스코드는 읽기만 해라
  pull-requests: write # ★ 핵심: PR에 댓글 쓸 수 있는 권한을 허용한다!

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval 20s
          --health-timeout 10s
          --health-retries 10
        ports:
          - 33306:3306
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: todo
          MYSQL_USER: todo
          MYSQL_PASSWORD: todo
    steps:
      - uses: actions/setup-go@v3
        with:
          go-version: ">=1.18"
      - uses: actions/checkout@v3
      - run: |
          go install github.com/k0kubun/sqldef/cmd/sqldef@latest
          mysqldef -u todo -p todo -h 127.0.0.1 -P 3306 todo --dry-run < ./_tools/mysql/schema.sql
      - run: go test ./... -coverprofile=coverage.out
      - name: report coverage
        uses: k1LoW/octocov-action@v0
