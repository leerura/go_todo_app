on:
  push:
    branches:
      - main
  pull_request:

name: test

# ⭕ [최종 해결책] 깃허브 액션 봇에게 댓글 작성 권한을 강제로 주입!
permissions:
  contents: read # 소스코드는 읽기만 해라
  pull-requests: write # ★ 핵심: PR에 댓글 쓸 수 있는 권한을 허용한다!

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-go@v3
        with:
          go-version: ">=1.18"
      - uses: actions/checkout@v3
      - run: go test ./... -coverprofile=coverage.out
      - name: report coverage
        uses: k1LoW/octocov-action@v0
